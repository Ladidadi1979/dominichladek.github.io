<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Offizielle Website des Autors Dominic Hladek. Fantasy Geschichten, Rollenspielpublikationen für Das Schwarze Auge, Die Schwarze Katze, Cthulhu, Space 1889 und weitere.">
<title>Kontakt | Dominic Hladek</title> 
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>

<main class="contact-page">
 	<div class="layout">
		<div class="content">
		  	<h1>Kontakt</h1>
		    <p>Für Anfragen zu meinen Werken und meiner Arbeit als Autor:</p>
			<div class="works">
				<div class="work">
					<div class="contact-info">
				        <p><strong>Email:</strong> <a href="mailto:dominic.hladek@googlemail.com">Dominic [dot] Hladek [ät] googlemail [dot] com</a></p>
				        <p><strong>Social:</strong> Folge mir auf 
				          <a href="https://bsky.app/profile/dominic-hladek.bsky.social" target="_blank"><img src="img/Bluesky_Logo.svg" alt="Bluesky" width="24"> Bluesky</a>
				        </p>
				        <p><strong>Amazon:</strong> Folge mir auf <a href="https://www.amazon.de/stores/Dominic-Hladek/author/B0786DQ6D4" target="_blank">
				            <img src="img/amazon.png" alt="Amazon Author" width="24"> Amazon Author</a>
				        </p>
			    	</div>
				</div>
			</div>
		</div>
	</div>
</main>

<div id="footer-placeholder"></div>

<script>
fetch("header.html")
  .then(r => r.text())
  .then(data => {
    // Header direkt als erstes Kind des Body einfügen
    document.body.insertAdjacentHTML("afterbegin", data);

    const links = document.querySelectorAll("nav a");
    const currentPage = window.location.pathname.split("/").pop();

    links.forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  });

fetch("footer.html")
  .then(r => r.text())
  .then(data => document.getElementById("footer-placeholder").innerHTML = data);
</script>
</body>
</html>
