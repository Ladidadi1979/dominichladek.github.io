<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Offizielle Website des Autors Dominic Hladek. Fantasy Geschichten, Rollenspielpublikationen für Das Schwarze Auge, Die Schwarze Katze, Cthulhu, Space 1889 und weitere.">
<title>Impressum | Dominic Hladek</title> 
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="works">
    <h1>Impressum</h1>
      <div class="work">
        <div class="work-top">
          <div class="work-meta">
            <p><strong>Dominic Hladek</strong></p>
            <p><strong>Adresse:</strong>Bussardweg 28<br>61118 Bad Vilbel<br>Deutschland</p>
            <p><strong>Email:</strong> <a href="mailto:dominic.hladek@googlemail.com">Dominic [dot] Hladek [ät] googlemail [dot] com</a></p>
            <p>Verantwortlich für den Inhalt gemäß § 55 Abs. 2 RStV: Dominic Hladek</p>
          </div>
        </div>
      </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script>
fetch("header.html")
  .then(r => r.text())
  .then(data => {
    // Header direkt als erstes Kind des Body einfügen
    document.body.insertAdjacentHTML("afterbegin", data);

    const links = document.querySelectorAll("nav a");
    const currentPage = window.location.pathname.split("/").pop();

    links.forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  });

fetch("footer.html")
  .then(r => r.text())
  .then(data => document.getElementById("footer-placeholder").innerHTML = data);
</script>
</body>
</html>
