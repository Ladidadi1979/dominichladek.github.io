<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Offizielle Website des Autors Dominic Hladek. Fantasy Geschichten, Rollenspielpublikationen für Das Schwarze Auge, Die Schwarze Katze, Cthulhu, Space 1889 und weitere.">
<title>Kontakt | Dominic Hladek</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="works">
    <h1>Kontakt</h1>
      <div class="work">
        <div class="work-top">
          <div class="work-meta">
            <p><strong>Email:</strong> <a href="mailto:dominic.hladek@googlemail.com">Dominic [dot] Hladek [ät] googlemail [dot] com</a></p>
            <p><strong>Hinweis:</strong> Für Anfragen zur Arbeit als Autor und zu den Werken.</p>
            <p></p>
            <p><a href="https://bsky.app/profile/dominic-hladek.bsky.social" target="_blank"><img src="img/Bluesky_Logo.svg" alt="Bluesky" width="24"></a></p>
            <p>Auf Bluesky folgen.</p>
          </div>
        </div>
      </div>
  </div>
</main>

<div id="footer-placeholder"></div>

<script>
fetch("header.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("header-placeholder").innerHTML = data;

    const links = document.querySelectorAll("nav a");
    const currentPage = window.location.pathname.split("/").pop();

    links.forEach(link => {
      const linkPage = link.getAttribute("href");
      if (linkPage === currentPage) {
        link.classList.add("active");
      }
    });
  });

fetch("footer.html")
  .then(r => r.text())
  .then(data => document.getElementById("footer-placeholder").innerHTML = data);
</script>
</body>
</html>
