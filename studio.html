<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Offizielle Website des Autors Dominic Hladek. Fantasy Geschichten, Rollenspielpublikationen für Das Schwarze Auge, Die Schwarze Katze, Cthulhu, Space 1889 und weitere.">
<title>Schreibwerkstatt | Dominic Hladek</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>
 
<main class="studio-page">
 	<div class="layout">
		<div class="content">
		  	<h1>Aus der Schreibwerkstatt</h1>
		    <p>Hier gibt es Einblicke in meine gerade aktuellen Arbeiten:</p>
    			<div class="works">
    				<div class="work">
    					<p>Bislang keine Inhalte hier. Updates folgen bald!</p>
    				</div>
    			</div>
		</div>
	</div>
</main>

<div id="footer-placeholder"></div>

<script>
fetch("header.html")
  .then(r => r.text())
  .then(data => {
    // Header direkt als erstes Kind des Body einfügen
    document.body.insertAdjacentHTML("afterbegin", data);

    const links = document.querySelectorAll("nav a");
    const currentPage = window.location.pathname.split("/").pop();

    links.forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  });

fetch("footer.html")
  .then(r => r.text())
  .then(data => document.getElementById("footer-placeholder").innerHTML = data);
</script>
</body>
</html>
